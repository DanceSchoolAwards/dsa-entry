<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Dance School Awards: Entries & Judging</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#c9a24b; --gold-soft:#e7cf91; --black:#0c0c0c; --panel:#161616;
    --panel-2:#1f1f1f; --line:#2c2c2c; --text:#f3efe6; --muted:#9a948a;
    --green:#3fae6b; --green-bg:#16321f; --red:#c8553d; --red-bg:#341a14;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--black);color:var(--text);
    font-family:'Montserrat',sans-serif;font-weight:300;line-height:1.5;}
  h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600;letter-spacing:.5px;margin:0}
  a{color:var(--gold)}
  .wrap{max-width:1040px;margin:0 auto;padding:0 20px}
  /* Header */
  header{border-bottom:1px solid var(--line);background:#000;position:sticky;top:0;z-index:10}
  .head-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;max-width:1040px;margin:0 auto}
  .logo{display:inline-flex;align-items:center;text-decoration:none}
  .logo img{height:46px;width:auto;display:block}
  .who{font-size:13px;color:var(--muted);display:flex;gap:14px;align-items:center}
  .who b{color:var(--text);font-weight:500}
  /* Buttons */
  button{font-family:'Montserrat',sans-serif;cursor:pointer;border:none;border-radius:6px;font-weight:500}
  .btn{background:var(--gold);color:#1a1407;padding:11px 20px;font-size:14px;transition:.15s}
  .btn:hover{background:var(--gold-soft)}
  .btn.ghost{background:transparent;color:var(--gold);border:1px solid var(--gold)}
  .btn.ghost:hover{background:rgba(201,162,75,.1)}
  .btn.sm{padding:8px 14px;font-size:13px}
  .btn.through{background:var(--green);color:#eafff1}
  .btn.notthrough{background:var(--red);color:#ffeee9}
  .btn.link{background:none;color:var(--muted);padding:6px 8px;font-size:13px}
  .btn.link:hover{color:var(--text)}
  /* Layout helpers */
  .center{min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:40px 20px}

d-repeat:no-repeat}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:28px}
  .stack{display:flex;flex-direction:column;gap:14px}
  label{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:block;margin-bottom:6px}
  input,select,textarea{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;
    color:var(--text);padding:11px 12px;font-family:inherit;font-size:14px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .muted{color:var(--muted)}
  .pill{display:inline-block;font-size:11px;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid var(--line)}
  .pill.paid{color:var(--green);border-color:var(--green)}
  .pill.unpaid{color:var(--muted)}
  .pill.through{background:var(--green-bg);color:#8fe0ab;border-color:var(--green)}
  .pill.notthrough{background:var(--red-bg);color:#e8a394;border-color:var(--red)}
  .banner{background:#241d09;border:1px solid var(--gold);color:var(--gold-soft);
    padding:8px 14px;font-size:12.5px;text-align:center}
  .err{color:#e8a394;font-size:13px}
  .ok{color:#8fe0ab;font-size:13px}
  .hidden{display:none!important}
  .section-title{display:flex;align-items:baseline;justify-content:space-between;margin:26px 0 14px}
  .section-title h2{font-size:30px}
  .tabs{display:flex;gap:8px;margin-top:6px}
  .tab{padding:8px 16px;border-radius:20px;background:var(--panel);border:1px solid var(--line);color:var(--muted);font-size:13px}
  .tab.active{background:var(--gold);color:#1a1407;border-color:var(--gold)}
  /* Entry cards */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .entry{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
  .video-box{aspect-ratio:16/9;background:#000;border-bottom:1px solid var(--line)}
  .video-box iframe,.video-box video{width:100%;height:100%;border:0;display:block}
  .entry-body{padding:16px;display:flex;flex-direction:column;gap:10px;flex:1}
  .entry-meta{font-size:12.5px;color:var(--muted);display:flex;flex-wrap:wrap;gap:8px}
  .entry-actions{display:flex;gap:8px;margin-top:auto}
  .entry-actions button{flex:1}
  .noms{display:flex;flex-direction:column;gap:6px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:9px 11px}
  .nom{display:flex;align-items:center;gap:8px;font-size:12.5px;text-transform:none;letter-spacing:0;color:var(--text);margin:0;cursor:pointer}
  .nom input{width:auto;margin:0}
  .score-box{display:flex;flex-direction:column;gap:8px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:11px 12px}
  .score-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .score-row label{font-size:12.5px;text-transform:none;letter-spacing:0;color:var(--text);margin:0;flex:1}
  .score-row input{width:64px;text-align:center;padding:6px 8px;font-size:14px}
  .score-total{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);padding-top:8px;margin-top:2px}
  .score-total b{font-size:18px;color:var(--gold)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:11px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:500;text-transform:uppercase;font-size:11px;letter-spacing:.5px}
  .tally{font-weight:600}
  .bar{height:6px;border-radius:4px;background:var(--panel-2);overflow:hidden;min-width:80px}
  .bar > i{display:block;height:100%;background:var(--green)}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .toolbar input{max-width:240px}
  @media(max-width:720px){.grid,.row{grid-template-columns:1fr}.head-inner{flex-direction:column;gap:8px}}
</style>
</head>

<script>
/* =================================================================
   1. CONFIGURATION  — paste your Supabase project values here.
   Find them in Supabase Dashboard -> Project Settings -> API.
   Until both are filled in, the app runs in DEMO mode so you can
   click through everything with sample data.

const SUPABASE_URL      = "https://mosaknuxxusipwbnggwo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vc2FrbnV4eHVzaXB3Ym5nZ3dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0ODgyODIsImV4cCI6MjA5NjA2NDI4Mn0.g2QUISTAOwn0bKGOmlKDPPqo-V8lHKiQ2yCiKQJhoUU";

// Optional: a Stripe Payment Link so dancers pay after submitting.
// Leave as "" to use a simple "Mark as paid" demo button instead.
const STRIPE_PAYMENT_LINK = "";

const ENTRY_FEE = 25; // fallback fee

// Entry fee + matching Wix payment link, by category. Each category links to its
// own Wix pay page (so International Solo / Group have their own).
const PAYLINK_BASE = "https://www.thedanceschoolawards.com/_paylink/";
function feeAndCode(category){
  switch(category){
    case "Solo":               return { fee:10, code:"AZ6N1uHa" };
    case "Duet":               return { fee:14, code:"AZ6N2iCq" };
    case "Trios & Quartets":   return { fee:18, code:"AZ6N2xqS" };
    case "Group":              return { fee:25, code:"AZ6N3A_p" };
    case "International Solo":  return { fee:15, code:"AZ6N3OkO" };
    case "International Group": return { fee:30, code:"AZ6N3cRI" };
    default:                   return { fee:25, code:"AZ6N3A_p" };  // Dance School (fallback)
  }
}
function priceFor(category){ return feeAndCode(category).fee; }
function payUrlFor(category){ return PAYLINK_BASE + feeAndCode(category).code; }

// Secure Dropbox upload connector (a free Supabase Edge Function).
const DROPBOX_UPLOAD_FN = SUPABASE_URL + "/functions/v1/dropbox-upload";
// Brevo confirmation-email connector.
const EMAIL_FN = SUPABASE_URL + "/functions/v1/send-entry-email";

const CATEGORIES   = ["Solo","Duet","Trios & Quartets","Group","International Solo","International Group"];
const STYLES       = ["Ballet","Character","Contemporary","Lyrical","Commercial","Street","Jazz","Modern","Acro","Tap","Musical Theatre","Latin & Ballroom"];
const ROUTE_TYPES  = ["Solo","Duet","Trios & Quartets","Group","International Solo","International Group"];   // types used for judge routing

// Judges score each entry on four criteria, each out of 25 (total 100).
const SCORE_PARTS = [
  { col:'score_technique',    label:'Technique' },
  { col:'score_artistry',     label:'Artistry' },
  { col:'score_choreography', label:'Choreography' },
  { col:'score_presence',     label:'Stage presence & overall impact' },
];
function decScored(d){ return !!d && SCORE_PARTS.some(p=> d[p.col]!=null && d[p.col]!==''); }
function decTotal(d){ return SCORE_PARTS.reduce((s,p)=> s + (Number(d&&d[p.col])||0), 0); }

// In the judging view, Commercial & Street appear under one combined heading.
const STYLE_GROUP = { 'Commercial':'Commercial & Street', 'Street':'Commercial & Street' };
function styleGroup(s){ return STYLE_GROUP[s] || s; }

// Work out a person's age from their date of birth (for display).
function ageFromDob(dob){
  if(!dob) return '';
  const b=new Date(dob); if(isNaN(b)) return '';
  const t=new Date(); let a=t.getFullYear()-b.getFullYear();
  if(t.getMonth()<b.getMonth() || (t.getMonth()===b.getMonth() && t.getDate()<b.getDate())) a--;
  return a>=0 && a<120 ? a+'' : '';
}

function makeSupabaseDB(){
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  return {
    live:true,
    async signIn(email,pw){ const {error}=await sb.auth.signInWithPassword({email,password:pw}); if(error) throw error; },
    async signOut(){ await sb.auth.signOut(); },
    async currentUser(){
      const {data:{user}}=await sb.auth.getUser();
      if(!user) return null;
      const {data:p}=await sb.from('profiles').select('full_name,role,assigned_styles').eq('id',user.id).single();
      return {id:user.id,email:user.email,name:(p&&p.full_name)||user.email,role:(p&&p.role)||'judge',assignedStyles:(p&&p.assigned_styles)||[]};
    },
    async listJudges(){ const {data,error}=await sb.from('profiles').select('id,full_name,role,assigned_styles').order('full_name'); if(error) throw error; return data; },
    async updateJudge(id,patch){ const {error}=await sb.from('profiles').update(patch).eq('id',id); if(error) throw error; },
    async addEntry(e){ const {error}=await sb.from('entries').insert(e); if(error) throw error; },
    async listEntries(){ const {data,error}=await sb.from('entries').select('*').order('created_at',{ascending:false}); if(error) throw error; return data; },
    async myDecisions(judgeId){ const {data,error}=await sb.from('decisions').select('*').eq('judge_id',judgeId); if(error) throw error; return data; },
    async setScore(entryId,judgeId,scores,notes,performShow){
      const {error}=await sb.from('decisions').upsert(
        {entry_id:entryId,judge_id:judgeId,notes,perform_at_show:!!performShow,
         score_technique:scores.score_technique, score_artistry:scores.score_artistry,
         score_choreography:scores.score_choreography, score_presence:scores.score_presence},
        {onConflict:'entry_id,judge_id'});
      if(error) throw error;
    },
    async results(){ const {data,error}=await sb.from('entry_results').select('*'); if(error) throw error; return data; },
    async entryScores(entryId){
      const {data:decs,error}=await sb.from('decisions').select('*').eq('entry_id',entryId);
      if(error) throw error;
      const ids=[...new Set((decs||[]).map(d=>d.judge_id))];
      let names={};
      if(ids.length){ const {data:profs}=await sb.from('profiles').select('id,full_name').in('id',ids); (profs||[]).forEach(p=>names[p.id]=p.full_name); }
      return (decs||[]).map(d=>({...d, judge_name: names[d.judge_id]||'Judge'}));
    },
    async markPaid(entryId){ const {error}=await sb.from('entries').update({payment_status:'paid'}).eq('id',entryId); if(error) throw error; },
    async updateEntry(entryId,fields){ const {error}=await sb.from('entries').update(fields).eq('id',entryId); if(error) throw error; },
    async deleteEntry(entryId){ await sb.from('decisions').delete().eq('entry_id',entryId); const {error}=await sb.from('entries').delete().eq('id',entryId); if(error) throw error; },
    async setScoutPass(entryId,judgeId,judgeName){ const {data,error}=await sb.from('entries').update({scout_pass_judge_id:judgeId,scout_pass_judge_name:judgeName}).eq('id',entryId).is('scout_pass_judge_id',null).select('id'); if(error) throw error; return !!(data&&data.length); },
    async clearScoutPass(entryId,judgeId){ let q=sb.from('entries').update({scout_pass_judge_id:null,scout_pass_judge_name:null}).eq('id',entryId); if(judgeId) q=q.eq('scout_pass_judge_id',judgeId); const {error}=await q; if(error) throw error; },
    async adminSetScoutPass(entryId,judgeId,judgeName){ const {error}=await sb.from('entries').update({scout_pass_judge_id:judgeId||null,scout_pass_judge_name:judgeName||null}).eq('id',entryId); if(error) throw error; },
    async getNotices(){ const {data,error}=await sb.from('app_settings').select('value').eq('key','notice_board').limit(1); if(error) throw error; const row=data&&data[0]; return (row&&row.value&&row.value.items)||[]; },
    async saveNotices(items){ const {error}=await sb.from('app_settings').upsert({key:'notice_board',value:{items},updated_at:new Date().toISOString()},{onConflict:'key'}); if(error) throw error; },
  };
}

// ---- Judge routing rules ----
// A judge's allocation is a list of "Style|Type" tokens (e.g. "Ballet|Solo").
// "*" is a wildcard, so "*|Duet" = duets of any style. No rules = sees everything.
function ruleMatches(rules, style, type){
  if(!rules || !rules.length) return true;
  return rules.some(r=>{
    const i=r.indexOf('|'); const s=r.slice(0,i), t=r.slice(i+1);
    return (s==='*'||s===style) && (t==='*'||t===type);
  });
}
// Group tokens into [{style, types:[...]}] for display/editing.
function groupRules(rules){
  const map=new Map();
  (rules||[]).forEach(r=>{ const i=r.indexOf('|'); const s=r.slice(0,i), t=r.slice(i+1);
    if(!map.has(s)) map.set(s,[]); if(!map.get(s).includes(t)) map.get(s).push(t); });
  return [...map.entries()].map(([style,types])=>({style,types}));
}
function ruleSummary(rules){
  if(!rules || !rules.length) return 'All sections';
  return groupRules(rules).map(g=>`${g.style==='*'?'Any style':g.style} (${g.types.map(t=>t==='*'?'all':t).join(', ')})`).join(' · ');
}

// Turn a Dropbox share link into something playable inline.
function dropboxEmbed(url){
  if(!url) return '';
  let u=url.trim();
  if(!/dropbox\.com/i.test(u)) return u;   // local / direct video URLs: leave as-is
  // Strip any dl param and force raw streaming.
  u=u.replace(/([?&])dl=\d/,'$1raw=1');
  if(!/[?&]raw=1/.test(u)) u+=(u.includes('?')?'&':'?')+'raw=1';
  return u;
}
function isVideoFile(url){ return /\.(mp4|mov|m4v|webm)(\?|$)/i.test(url); }

// ---- Direct video upload into the organisers' Dropbox ----
// The file is streamed to a free Supabase Edge Function (which holds the
// Dropbox keys privately) in 8 MB chunks; it returns a shareable link.
function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(String(r.result).split(',')[1]);
    r.onerror=()=>reject(new Error('Could not read the file.'));
    r.readAsDataURL(blob);
  });
}
async function uploadToDropbox(file, onProgress, meta){
  if(!LIVE){ // Demo: simulate so the flow is testable without the connector.
    for(let p=0;p<=100;p+=20){ onProgress&&onProgress(p); await new Promise(r=>setTimeout(r,120)); }
    return 'https://www.dropbox.com/s/demo/'+encodeURIComponent(file.name)+'?raw=1';
  }
  const FN=DROPBOX_UPLOAD_FN;
  const headers={'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_ANON_KEY};
  // Name the file after the entrant so it's identifiable in Dropbox.
  const ext=(file.name.match(/\.[A-Za-z0-9]+$/)||['.mp4'])[0];
  // Filename carries all their info: Name - School - Category - Style
  const niceName=([meta&&meta.name, meta&&meta.school, meta&&meta.category, meta&&meta.style].filter(Boolean).join(' - ') || 'entry')+ext;
  const startRes=await fetch(FN,{method:'POST',headers,body:JSON.stringify({action:'start'})});
  if(!startRes.ok) throw new Error('Could not start the upload. Please try again.');
  const {session_id}=await startRes.json();
  const CHUNK=8*1024*1024; let offset=0;
  while(offset<file.size){
    const end=Math.min(offset+CHUNK,file.size);
    const b64=await blobToBase64(file.slice(offset,end));
    const last=end>=file.size;
    const res=await fetch(FN,{method:'POST',headers,body:JSON.stringify({
      action:last?'finish':'append', session_id, offset, data:b64,
      filename:last?niceName:undefined,
      category:last?(meta&&meta.category):undefined,
      style:last?(meta&&meta.style):undefined })});
    if(!res.ok) throw new Error('Upload interrupted around '+Math.round(offset/1e6)+' MB. Please try again.');
    offset=end;
    onProgress&&onProgress(Math.round(offset/file.size*100));
    if(last){ const {link}=await res.json(); if(!link) throw new Error('Upload finished but no link came back. Please tell the organisers.'); return link; }
  }
  throw new Error('Upload did not complete.');
}

      window.removeEventListener('beforeunload', warn);
      msg.innerHTML='<span class="err">'+esc(e.message)+'</span>';
      upWrap.classList.add('hidden'); submit.disabled=false; submit.textContent='Submit & continue to payment';
    }
  };
}

function renderPayStep(name, price, payUrl){
  const fee = price!=null ? price : ENTRY_FEE;
  const payBlock = payUrl
    ? `<a class="btn" href="${payUrl}" target="_blank" rel="noopener">Pay £${fee} now</a>`
    : `<span class="muted">Payment link unavailable. Please contact the organisers.</span>`;
  app.innerHTML=`
  <div class="center">
    <div class="card" style="width:520px;max-width:100%;text-align:center">
      <h2 style="font-size:30px">Entry received 🎉</h2>
      <p class="muted" style="margin:12px 0 22px">Thank you, ${esc(name)}. Your video has uploaded and your entry is submitted.
      To complete it, please pay the £${fee} entry fee.</p>
      ${payBlock}
    </div>
  </div>`;
}

/* ---------- Judge dashboard ---------- */
async function renderJudge(){
  app.innerHTML=`<div class="wrap"><div class="section-title"><h2>Judging</h2></div>
    <div class="muted">Loading entries…</div></div>`;
  const u=state.user;
  const [entries,mine]=await Promise.all([db.listEntries(),db.myDecisions(u.id)]);
  const decided=new Map(mine.map(d=>[d.entry_id,d]));
  // Show paid entries that match this judge's allocation (style + type).
  // A judge with no rules assigned sees everything.
  const myRules = (u.assignedStyles||[]);
  let list=entries.filter(e=>e.payment_status==='paid' && ruleMatches(myRules, e.dance_style, e.category));
  const pending=list.filter(e=>!decScored(decided.get(e.id)));
  const done=list.filter(e=>decScored(decided.get(e.id)));

  // Group entries by display style (Commercial & Street appear together).
  const groupOf = e => styleGroup(e.dance_style);
  const allGroups = [...new Set(STYLES.map(styleGroup))];
  const present = allGroups.filter(g=>list.some(e=>groupOf(e)===g));
  const others  = [...new Set(list.map(e=>groupOf(e)).filter(g=>g && !allGroups.includes(g)))];
  const groupOrder = [...present, ...others];
  const styleOptions = [`<option value="__all">All sections</option>`]
    .concat(groupOrder.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`)).join('');

  const sectionNote = `<span class="muted">Your sections: ${esc(ruleSummary(myRules))}</span>`;

  app.innerHTML=`<div class="wrap">
    <div class="section-title">
      <h2>Judging</h2>
      <span style="display:flex;gap:12px;align-items:center">
        <span class="muted">${pending.length} to score · ${done.length} scored</span>
        <button class="btn ghost sm" id="judgeNotices">📋 Notice board</button>
      </span>
    </div>
    <div style="margin:-6px 0 10px">${sectionNote}</div>
    <div class="tabs" style="justify-content:space-between;align-items:center">
      <div style="display:flex;gap:8px">
        <button class="tab active" data-tab="todo">To score (${pending.length})</button>
        <button class="tab" data-tab="done">Scored (${done.length})</button>
      </div>
      <select id="styleFilter" style="max-width:220px">${styleOptions}</select>
    </div>
    <div class="toolbar" style="margin:10px 0 0;flex-wrap:wrap;gap:8px">
      <select id="jCat"><option value="">All categories</option>${CATEGORIES.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('')}</select>
      <select id="jScout"><option value="">Scout pass: any</option><option value="yes">⭐ Has scout pass</option><option value="no">No scout pass</option></select>
      <select id="jPerform"><option value="">Performing: any</option><option value="yes">🎭 Selected to perform</option><option value="no">Not selected</option></select>
    </div>
    <div id="judgeList" style="margin-top:18px"></div>
  </div>`;

  let curTab='todo', curStyle='__all', curCat='', curScout='', curPerform='';
  function matchFilters(e){
    if(curStyle!=='__all' && groupOf(e)!==curStyle) return false;
    if(curCat && e.category!==curCat) return false;
    if(curScout==='yes' && !e.scout_pass_judge_id) return false;
    if(curScout==='no' && e.scout_pass_judge_id) return false;
    if(curPerform==='yes' && !e.selected_to_perform) return false;
    if(curPerform==='no' && e.selected_to_perform) return false;
    return true;
  }

  function paint(){
    const base = curTab==='todo'?pending:done;
    const items = base.filter(matchFilters);
    const box=$('#judgeList');
    if(!items.length){ box.innerHTML=`<p class="muted">Nothing here yet.</p>`; return; }
    const groups = (curStyle==='__all' ? groupOrder : [curStyle])
      .map(s=>({style:s, rows:items.filter(e=>groupOf(e)===s)}))
      .filter(g=>g.rows.length);
    box.innerHTML = groups.map(g=>`
      <div style="margin-bottom:26px">
        <h3 style="font-size:22px;color:var(--gold);border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:14px">
          ${esc(g.style||'Unspecified')} <span class="muted" style="font-size:13px;font-family:'Montserrat'">(${g.rows.length})</span>
        </h3>
        <div class="grid">${g.rows.map(e=>entryCard(e,decided.get(e.id))).join('')}</div>
      </div>`).join('');
    // Live total as marks are typed.
    box.querySelectorAll('input[data-score]').forEach(inp=>{
      inp.oninput=()=>{
        const id=inp.getAttribute('data-score').split('|')[0];
        let t=0; SCORE_PARTS.forEach(p=>{ const el=box.querySelector(`input[data-score="${id}|${p.col}"]`); let n=Number(el.value); if(isNaN(n))n=0; n=Math.max(0,Math.min(25,n)); t+=n; });
        const tt=box.querySelector(`[data-total="${id}"]`); if(tt) tt.textContent=t+'/100';
      };
    });
    // Save the scores.
    box.querySelectorAll('[data-save]').forEach(btn=>{
      btn.onclick=async()=>{
        const id=btn.getAttribute('data-save');
        const msg=box.querySelector(`[data-msg="${id}"]`);
        const scores={}; let valid=true;
        SCORE_PARTS.forEach(p=>{
          const v=box.querySelector(`input[data-score="${id}|${p.col}"]`).value.trim();
          if(v===''){ valid=false; scores[p.col]=null; return; }
          scores[p.col]=Math.max(0,Math.min(25,Math.round(Number(v))));
        });
        if(!valid){ msg.innerHTML='<span class="err">Please give a mark (0–25) for all four criteria.</span>'; return; }
        const notes=box.querySelector(`textarea[data-notes="${id}"]`).value;
        const perform=box.querySelector(`input[data-perform="${id}"]`).checked;
        btn.textContent='Saving…'; btn.disabled=true;
        await db.setScore(id,u.id,scores,notes,perform);
        renderJudge();
      };
    });
  }
  function entryCard(e,dec){
    const src=dropboxEmbed(e.video_url);
    const player= isVideoFile(e.video_url)
      ? `<video controls preload="metadata" src="${esc(src)}"></video>`
      : `<iframe src="${esc(src)}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
    const scored=decScored(dec);
    const status= scored? `<span class="pill through">Scored ${decTotal(dec)}/100</span>`:'';
    const scoutedBy=e.scout_pass_judge_name||'';
    const scoutBadge=e.scout_pass_judge_id?`<span class="pill" style="background:#3a2e10;color:var(--gold);border:1px solid var(--gold-soft);white-space:nowrap">⭐ Scout pass${scoutedBy?` — ${esc(scoutedBy)}`:''}</span>`:'';
    const selectedBadge=e.selected_to_perform?`<span class="pill" style="background:#10302a;color:#7fe6c4;border:1px solid #2f6f5e;white-space:nowrap">🎭 Selected to perform</span>`:'';
    const age=ageFromDob(e.date_of_birth);
    const dob=e.date_of_birth?esc(e.date_of_birth)+(age?` (age ${age})`:''):'Not given';
    const detailRow=(label,val)=>`<div style="display:flex;gap:8px;padding:3px 0">
        <span class="muted" style="min-width:120px;display:inline-block">${label}</span>
        <b>${val}</b></div>`;
    const details = detailRow('Dance school', e.school_name?esc(e.school_name):'Not given')
      + detailRow('Date of birth', dob)
      + detailRow('Category', esc(e.category))
      + detailRow('Dance style', esc(e.dance_style));
    const scoreRows = SCORE_PARTS.map(p=>{
      const v = dec && dec[p.col]!=null ? dec[p.col] : '';
      return `<div class="score-row"><label>${esc(p.label)}</label>
        <input type="number" min="0" max="25" step="1" data-score="${e.id}|${p.col}" value="${v}" placeholder="/25"></div>`;
    }).join('');
    return `<div class="entry">
      <div class="video-box">${player}</div>
      <div class="entry-body">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
          <h3 style="font-size:21px">${esc(e.dancer_name)}</h3>
          <div style="display:flex;gap:6px;flex-wrap:wrap">${selectedBadge}${scoutBadge}${status}</div>
        </div>
        <div class="entry-meta" style="display:block;font-size:14px;margin:6px 0 12px">
          ${details}
        </div>
        <div class="score-box">
          ${scoreRows}
          <div class="score-total"><span class="muted">Total</span><b data-total="${e.id}">${scored?decTotal(dec):0}/100</b></div>
        </div>
        <textarea data-notes="${e.id}" rows="2" placeholder="Notes (optional)">${esc(dec&&dec.notes||'')}</textarea>
        <label class="nom" style="background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:9px 11px">
          <input type="checkbox" data-perform="${e.id}" ${dec&&dec.perform_at_show?'checked':''}> 🎭 Nominate to perform at the show</label>
        <div class="entry-actions">
          <button class="btn sm" data-save="${e.id}" style="flex:1">${scored?'✓ Update score':'Save score'}</button>
        </div>
        <div data-msg="${e.id}" style="margin-top:2px"></div>
      </div>
    </div>`;
  }
  app.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    app.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); curTab=t.getAttribute('data-tab'); paint();
  });
  $('#styleFilter').onchange=e=>{ curStyle=e.target.value; paint(); };
  $('#jCat').onchange=e=>{ curCat=e.target.value; paint(); };
  $('#jScout').onchange=e=>{ curScout=e.target.value; paint(); };
  $('#jPerform').onchange=e=>{ curPerform=e.target.value; paint(); };
  $('#judgeNotices').onclick=()=>renderNoticeBoard();
  paint();
}

async function renderAdmin(){

  rows.sort((a,b)=> ((b.avg_total||0)-(a.avg_total||0)) || ((b.num_scores||0)-(a.num_scores||0)));

  const revenue=paidRows.reduce((s,r)=>s+(Number(r.entry_fee)||0),0);

  app.innerHTML=`<div class="wrap">
    <div class="section-title"><h2>Admin Results</h2>
      <span style="display:flex;gap:14px;align-items:center">
        <span class="muted">${totalEntries} entries · ${paid} paid · £${revenue} collected</span>

      <thead><tr>
        <th>Dancer / group</th><th>Category</th><th>Style</th><th>DOB</th>
        <th>Payment</th><th>Avg score</th><th>Judges</th><th>Perform</th><th></th>
      </tr></thead>
      <tbody></tbody>
    </table></div>
  </div>`;

  let filter='paid', q='', catF='', styleF='', scoutF='', performF='';
  function paint(){
    const tb=$('#resTable tbody');
    const data=rows.filter(r=>{
      if(filter!=='all'&&r.payment_status!==filter) return false;
      if(q&&!(`${r.dancer_name} ${r.school_name||''}`.toLowerCase().includes(q))) return false;
      if(catF&&r.category!==catF) return false;
      if(styleF&&r.dance_style!==styleF) return false;
      if(scoutF==='yes'&&!r.scout_pass_judge_id) return false;
      if(scoutF==='no'&&r.scout_pass_judge_id) return false;
      if(performF==='yes'&&!r.selected_to_perform) return false;
      if(performF==='no'&&r.selected_to_perform) return false;
      return true;
    });
    tb.innerHTML=data.map(r=>{
      const avg = r.avg_total!=null ? r.avg_total : null;
      const pct = avg!=null ? Math.round(avg) : 0;
      const dob = r.date_of_birth ? esc(r.date_of_birth)+(ageFromDob(r.date_of_birth)?` (${ageFromDob(r.date_of_birth)})`:'') : '';
      return `<tr>
        <td><b>${esc(r.dancer_name)}</b>${r.scout_pass_judge_id?` <span title="Scout pass from ${esc(r.scout_pass_judge_name||'')}" style="color:var(--gold);font-size:12px;white-space:nowrap">⭐ Scout pass</span>`:''}${r.selected_to_perform?` <span style="color:#7fe6c4;font-size:12px;white-space:nowrap">🎭 Selected</span>`:''}<br><span class="muted" style="font-size:12px">${esc(r.school_name||'')}</span></td>
        <td>${esc(r.category||'')}</td><td>${esc(r.dance_style||'')}</td><td>${dob}</td>
        <td><span class="pill ${r.payment_status}">${r.payment_status}</span></td>
        <td>${avg!=null?`<b style="color:var(--gold)">${avg}</b>/100<div class="bar" style="margin-top:5px"><i style="width:${pct}%"></i></div>`:'<span class="muted">Not scored</span>'}</td>
        <td class="tally">${r.num_scores||0}</td>
        <td style="white-space:nowrap">${(r.votes_perform||0)?`<span title="Perform at show">🎭 ${r.votes_perform}</span>`:'<span class="muted">-</span>'}</td>
        <td style="white-space:nowrap"><button class="btn ghost sm" data-view="${r.id}">View</button>${r.payment_status==='unpaid'?` <button class="btn ghost sm" data-paid="${r.id}">Mark paid</button>`:''}</td>
      </tr>`;
    }).join('') || `<tr><td colspan="9" class="muted">No matching entries.</td></tr>`;
    tb.querySelectorAll('[data-paid]').forEach(b=>b.onclick=async()=>{await db.markPaid(b.getAttribute('data-paid'));renderAdmin();});
    tb.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>renderAdminEntry(rows.find(x=>x.id===b.getAttribute('data-view'))));
  }
  $('#search').oninput=e=>{q=e.target.value.toLowerCase();paint();};
  $('#fCat').onchange=e=>{catF=e.target.value;paint();};
  $('#fStyle').onchange=e=>{styleF=e.target.value;paint();};
  $('#fScout').onchange=e=>{scoutF=e.target.value;paint();};
  $('#fPerform').onchange=e=>{performF=e.target.value;paint();};
  $('#clearFilters').onclick=()=>{ catF=styleF=scoutF=performF=''; $('#fCat').value='';$('#fStyle').value='';$('#fScout').value='';$('#fPerform').value=''; paint(); };
  app.querySelectorAll('[data-f]').forEach(t=>t.onclick=()=>{
    app.querySelectorAll('[data-f]').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); filter=t.getAttribute('data-f'); paint();
  });
  $('#exportBtn').onclick=()=>{
    const head=['Dancer','School','Category','Style','DOB','Payment','AvgScore','JudgesScored','PerformNoms'];
    const lines=[head.join(',')].concat(rows.map(r=>[
      r.dancer_name,r.school_name,r.category,r.dance_style,r.date_of_birth,
      r.payment_status,r.avg_total!=null?r.avg_total:'',r.num_scores||0,r.votes_perform||0
    ].map(v=>`"${(v==null?'':v).toString().replace(/"/g,'""')}"`).join(',')));
    const blob=new Blob([lines.join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='dance-school-awards-results.csv';a.click();
  };
  $('#manageJudges').onclick=()=>renderJudgesAdmin();
  $('#noticeBoardBtn').onclick=()=>renderNoticeBoard();
  paint();
}

          <label>Email<input id="f_email" value="${esc(r.email||'')}"></label>
          <label>Phone<input id="f_phone" value="${esc(r.phone||'')}"></label>
          <label>Payment<select id="f_pay">
            <option value="paid"${r.payment_status==='paid'?' selected':''}>paid</option>
            <option value="unpaid"${r.payment_status!=='paid'?' selected':''}>unpaid</option>
          </select></label>
          <label>Scout pass from<select id="f_scout">${scoutOpts}</select></label>
          <label class="nom" style="background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:9px 11px">
            <input type="checkbox" id="f_selected" ${r.selected_to_perform?'checked':''}> 🎭 Selected to perform at the show</label>
        </div>
        <div style="display:flex;gap:8px;margin-top:14px;align-items:center">
          <button class="btn sm" id="saveEntry">Save changes</button>
          <button class="btn ghost sm" id="cancelEdit">Cancel</button>
          <button class="btn ghost sm" id="delEntry" style="margin-left:auto;color:#e88">Delete entry</button>
        </div>
        <div id="editMsg" style="margin-top:8px"></div>
      </div>

      <h3 style="font-size:20px;color:var(--gold);margin:24px 0 10px">Judges' scores</h3>
      <div id="judgeScores"><p class="muted">Loading…</p></div>
    </div>
  </div>`;
  $('#backAdmin').onclick=()=>renderAdmin();
  $('#editEntry').onclick=()=>{ const p=$('#editPanel'); const t=$('#entryTable');
    const open=p.style.display==='none'; p.style.display=open?'block':'none'; t.style.display=open?'none':'table'; };
  $('#cancelEdit').onclick=()=>{ $('#editPanel').style.display='none'; $('#entryTable').style.display='table'; };
  $('#saveEntry').onclick=async()=>{
    const cat=$('#f_cat').value;
    const scoutSel=$('#f_scout'); const scoutId=scoutSel.value||null;
    const scoutName=scoutId?scoutSel.options[scoutSel.selectedIndex].text:null;
    const fieldsOut={
      dancer_name: $('#f_name').value.trim(),
      school_name: $('#f_school').value.trim()||null,
      category: cat,
      dance_style: $('#f_style').value,
      date_of_birth: $('#f_dob').value||null,
      email: $('#f_email').value.trim(),
      phone: $('#f_phone').value.trim()||null,
      payment_status: $('#f_pay').value,
      entry_fee: priceFor(cat),
      scout_pass_judge_id: scoutId,
      scout_pass_judge_name: scoutName,
      selected_to_perform: $('#f_selected').checked,
    };
    const btn=$('#saveEntry'); btn.textContent='Saving…'; btn.disabled=true;
    try{ await db.updateEntry(r.id,fieldsOut); Object.assign(r,fieldsOut); renderAdminEntry(r); }
    catch(e){ $('#editMsg').innerHTML='<span class="err">Could not save: '+esc(String(e.message||e))+'</span>'; btn.textContent='Save changes'; btn.disabled=false; }
  };
  $('#delEntry').onclick=async()=>{
    if(!confirm('Delete this entry permanently? This removes it from the app (the Dropbox video is not affected).')) return;
    const btn=$('#delEntry'); btn.textContent='Deleting…'; btn.disabled=true;
    try{ await db.deleteEntry(r.id); renderAdmin(); }
    catch(e){ $('#editMsg').innerHTML='<span class="err">Could not delete: '+esc(String(e.message||e))+'</span>'; btn.textContent='Delete entry'; btn.disabled=false; }
  };
  let scores=[];
  try{ scores=(await db.entryScores(r.id)).filter(decScored); }catch(e){}
  scores.sort((a,b)=>decTotal(b)-decTotal(a));
  $('#judgeScores').innerHTML = scores.length ? scores.map(s=>`
    <div style="border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px">
        <div style="font-size:16px"><span class="muted">Judge:</span> <b>${esc(s.judge_name)}</b></div>
        <span class="pill through">Total ${decTotal(s)}/100</span>
      </div>
      ${SCORE_PARTS.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid var(--line);font-size:14px">
        <span>${esc(p.label)}</span><b style="color:var(--gold-soft)">${s[p.col]!=null?s[p.col]:'-'} / 25</b></div>`).join('')}
      ${s.perform_at_show?`<div style="margin-top:9px;font-size:13px">🎭 Nominated to perform at the show</div>`:''}
      ${s.notes?`<div style="margin-top:9px;font-size:13px;color:var(--muted)">Notes: “${esc(s.notes)}”</div>`:''}
    </div>`).join('') : '<p class="muted">No judge has scored this entry yet.</p>';
}

/* ---------- Notice board (judges read; admin edits) ---------- */
async function renderNoticeBoard(){
  app.innerHTML=`<div class="wrap"><div class="section-title"><h2>Notice board</h2></div><div class="muted">Loading…</div></div>`;
  const isAdmin = state.user && state.user.role==='admin';
  const back = ()=> isAdmin ? renderAdmin() : renderJudge();
  let items=[]; try{ items=await db.getNotices(); }catch(e){}

  function viewRows(){
    if(!items.length) return '<p class="muted">No notices yet.</p>';
    return items.map(it=>`
      <div style="border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:14px;background:var(--panel)">
        ${it.title?`<div style="color:var(--gold);font-size:19px;font-family:'Playfair Display',serif;margin-bottom:6px">${esc(it.title)}</div>`:''}
        <div style="white-space:pre-wrap;line-height:1.65;font-size:15px">${esc(it.body||'')}</div>
      </div>`).join('');
  }

  function showView(){
    app.innerHTML=`<div class="wrap">
      <div class="section-title"><h2>Notice board</h2>
        <div style="display:flex;gap:8px">
          ${isAdmin?`<button class="btn sm" id="editBoard">Edit board</button>`:''}
          <button class="btn ghost sm" id="backBoard">← Back</button>
        </div></div>
      <div style="max-width:680px">${viewRows()}</div>
    </div>`;
    $('#backBoard').onclick=back;
    if(isAdmin) $('#editBoard').onclick=showEdit;
  }

  function showEdit(){
    const rowHTML=(it,i)=>`<div class="nb-row" data-i="${i}" style="border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;background:var(--panel-2)">
      <input class="nb-title" value="${esc(it.title||'')}" placeholder="Heading (e.g. Event date)" style="width:100%;margin-bottom:8px">
      <textarea class="nb-body" rows="3" placeholder="Details" style="width:100%">${esc(it.body||'')}</textarea>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn ghost sm nb-up" title="Move up">↑</button>
        <button class="btn ghost sm nb-down" title="Move down">↓</button>
        <button class="btn ghost sm nb-del" style="margin-left:auto;color:#e88">Remove</button>
      </div></div>`;
    function readBack(){
      app.querySelectorAll('.nb-row').forEach(rowEl=>{ const i=+rowEl.getAttribute('data-i');
        if(items[i]){ items[i].title=rowEl.querySelector('.nb-title').value; items[i].body=rowEl.querySelector('.nb-body').value; } });
    }
    function paint(){
      app.innerHTML=`<div class="wrap">
        <div class="section-title"><h2>Edit notice board</h2>
          <button class="btn ghost sm" id="backBoard">← Back</button></div>
        <div style="max-width:680px">
          <div id="nbRows">${items.map(rowHTML).join('')}</div>
          <button class="btn ghost sm" id="addRow">+ Add row</button>
          <div style="display:flex;gap:8px;margin-top:16px;align-items:center">
            <button class="btn sm" id="saveBoard">Save board</button>
            <button class="btn ghost sm" id="cancelBoard">Cancel</button>
            <span id="boardMsg"></span>
          </div>
        </div></div>`;
      app.querySelectorAll('.nb-row').forEach(rowEl=>{ const i=+rowEl.getAttribute('data-i');
        rowEl.querySelector('.nb-del').onclick=()=>{ readBack(); items.splice(i,1); paint(); };
        rowEl.querySelector('.nb-up').onclick=()=>{ readBack(); if(i>0){ const t=items[i-1]; items[i-1]=items[i]; items[i]=t; } paint(); };
        rowEl.querySelector('.nb-down').onclick=()=>{ readBack(); if(i<items.length-1){ const t=items[i+1]; items[i+1]=items[i]; items[i]=t; } paint(); };
      });
      $('#addRow').onclick=()=>{ readBack(); items.push({title:'',body:''}); paint(); };
      $('#cancelBoard').onclick=showView;
      $('#backBoard').onclick=showView;
      $('#saveBoard').onclick=async()=>{
        readBack();
        const clean=items.filter(it=>(it.title&&it.title.trim())||(it.body&&it.body.trim()));
        const btn=$('#saveBoard'); btn.textContent='Saving…'; btn.disabled=true;
        try{ await db.saveNotices(clean); items=clean; showView(); }
        catch(e){ $('#boardMsg').innerHTML='<span class="err">Could not save: '+esc(String(e.message||e))+'</span>'; btn.textContent='Save board'; btn.disabled=false; }
      };
    }
    paint();
  }

  showView();
}

/* ---------- Admin: judges & section allocation ---------- */
async function renderJudgesAdmin(){
  app.innerHTML=`<div class="wrap"><div class="section-title"><h2>Judges &amp; sections</h2></div>
    <div class="muted">Loading judges…</div></div>`;
  const all=await db.listJudges();
  const judges=all.filter(j=>j.role==='judge');

  app.innerHTML=`<div class="wrap">
    <div class="section-title"><h2>Judges &amp; sections</h2>
      <button class="btn ghost sm" id="backResults">← Back to results</button></div>
    <p class="muted" style="margin:-6px 0 18px;font-size:13px">
      Pick a style and tick the entry types it covers. "Any style" covers that type across all styles.
      Judges only see their matching entries.</p>
    <div id="judgesList" class="stack" style="gap:16px"></div>
    ${judges.length?'':'<p class="muted">No judges yet. Create judge logins in Supabase → Authentication → Users, then refresh.</p>'}
  </div>`;

  const box=$('#judgesList');

  // One "rule row" = a style (or Any) + the entry types it applies to.
  function rowHTML(style, types){
    const opts=['<option value="*"'+(style==='*'?' selected':'')+'>Any style</option>']
      .concat(STYLES.map(s=>`<option value="${esc(s)}"${s===style?' selected':''}>${esc(s)}</option>`)).join('');
    const tboxes=ROUTE_TYPES.map(t=>
      `<label class="nom" style="display:inline-flex"><input type="checkbox" class="rule-type" value="${t}" ${types.includes(t)?'checked':''}> ${t}</label>`).join('');
    return `<div class="rule-row" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:10px 0;border-top:1px solid var(--line)">
      <select class="rule-style" style="max-width:190px">${opts}</select>
      <div style="display:flex;gap:12px;flex-wrap:wrap">${tboxes}</div>
      <button class="btn link rule-remove" type="button" style="margin-left:auto">✕ Remove</button>
    </div>`;
  }

  box.innerHTML=judges.map(j=>{
    const rows=groupRules(j.assigned_styles||[]).map(g=>rowHTML(g.style,g.types)).join('');
    return `<div class="card" data-card="${j.id}">
      <div style="display:flex;gap:12px;align-items:flex-end;justify-content:space-between;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <label>Judge name / login</label>
          <input data-name="${j.id}" value="${esc(j.full_name||'')}" style="max-width:360px">
        </div>
        <button class="btn sm" data-save="${j.id}">Save</button>
      </div>
      <div style="margin-top:14px">
        <label>Sections this judge reviews: choose a style, tick the types</label>
        <div class="rules" data-rules="${j.id}">${rows}</div>
        <button class="btn ghost sm rule-add" data-add="${j.id}" type="button" style="margin-top:10px">+ Add section</button>
        <p class="muted" style="font-size:12px;margin:8px 0 0">No sections added = this judge sees every entry.</p>
      </div>
      <div data-msg="${j.id}" style="margin-top:8px"></div>
    </div>`;
  }).join('');

  // Add / remove rule rows (delegated, so dynamically-added rows work too).
  box.addEventListener('click', e=>{
    const rm=e.target.closest('.rule-remove');
    if(rm){ rm.closest('.rule-row').remove(); return; }
    const add=e.target.closest('.rule-add');
    if(add){ box.querySelector(`[data-rules="${add.getAttribute('data-add')}"]`).insertAdjacentHTML('beforeend', rowHTML('Ballet',[])); }
  });

  function gatherRules(id){
    const rules=[];
    box.querySelector(`[data-rules="${id}"]`).querySelectorAll('.rule-row').forEach(row=>{
      const s=row.querySelector('.rule-style').value;
      row.querySelectorAll('.rule-type:checked').forEach(c=>rules.push(`${s}|${c.value}`));
    });
    return [...new Set(rules)];
  }

  box.querySelectorAll('[data-save]').forEach(btn=>{
    btn.onclick=async()=>{
      const id=btn.getAttribute('data-save');
      const name=box.querySelector(`input[data-name="${id}"]`).value.trim();
      const rules=gatherRules(id);
      const msg=box.querySelector(`[data-msg="${id}"]`);
      btn.textContent='Saving…';
      try{
        await db.updateJudge(id,{full_name:name,assigned_styles:rules});
        msg.innerHTML=`<span class="ok">Saved: ${esc(ruleSummary(rules))}.</span>`;
      }catch(e){ msg.innerHTML=`<span class="err">${esc(e.message)}</span>`; }
      btn.textContent='Save';
    };
  });
  $('#backResults').onclick=()=>renderAdmin();
}
